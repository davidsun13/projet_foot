services:
  db:
    image: postgres:16
    container_name: projet_club_db
    restart: always
    shm_size: 128mb
    ports:
      - "5432:5432"
    volumes:
      - ./Back/initdb.d/:/docker-entrypoint-initdb.d
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: toto
      POSTGRES_PASSWORD: example
      POSTGRES_DB: projet_club_db

  backend:
    build:
      context: .
      dockerfile: be/Dockerfile
    container_name: projet_club_backend
    restart: always
    ports:
      - "1234:1234"
    depends_on:
      - db
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: toto
      PGPASSWORD: example
      PGDATABASE: projet_club_db

  frontend:
    build:
      context: .
      dockerfile: fe/Dockerfile
    container_name: projet_club_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
    name: "projet_club_db_pg_data"