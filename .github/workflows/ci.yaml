name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
    - name : Checkout 
    - uses: actions/checkout@v2
    
    - name : install node.js 
    - uses: actions/setup-node@v2
      with:
        node-version: '20'
    
    - name: install deps
      run: npm ci

    - name: run tests
      run: npm test
    
    
    
